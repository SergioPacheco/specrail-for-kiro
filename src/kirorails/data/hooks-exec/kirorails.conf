# KiroRails Hook Configuration
# Edit these commands to match your project's build tools.
# Lines starting with # are ignored. Empty lines skip that check.

# Compilation / type check
compile=./mvnw compile -q

# Test suite
test=./mvnw test -q

# Linter / static analysis
lint=./mvnw checkstyle:check -q

# Security scan (optional — leave empty to skip)
security=

# kiro-cli trust level for automated execution
# Options: all | read,write,shell | read,write | (empty = ask every time)
kiro_trust_tools=read,write,shell
